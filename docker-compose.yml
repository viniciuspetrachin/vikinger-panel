services:
  valheim:
    image: lloesche/valheim-server:latest
    container_name: valheim-server
    restart: unless-stopped
    cap_add:
      - sys_nice
    stop_grace_period: 120s
    ports:
      - "2456-2458:2456-2458/udp"
    volumes:
      - ${HOST_PROJECT_DIR:-.}/config:/config
      - ${HOST_PROJECT_DIR:-.}/data:/opt/valheim
    env_file:
      - .env
    environment:
      BEPINEX: "true"
      SERVER_PORT: "2456"
      TZ: America/Sao_Paulo
      PUID: "1000"
      PGID: "1000"

  panel:
    build: .
    container_name: valheim-panel
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "${PANEL_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_PROJECT_DIR:-.}:${HOST_PROJECT_DIR:-.}
      # Sobrepõe symlinks do host — dados reais do mundo ficam acessíveis no container
      - /home/vinicius/valheim-server/config:${HOST_PROJECT_DIR:-.}/config
      - /home/vinicius/valheim-server/data:${HOST_PROJECT_DIR:-.}/data
    environment:
      VALHEIM_PANEL_ROOT: ${HOST_PROJECT_DIR:-.}
      PANEL_UID: "1000"
      PANEL_GID: "1000"
      DOCKER_GID: "${DOCKER_GID:-999}"
      PANEL_BUILD_DATE: ${PANEL_BUILD_DATE:-}
    working_dir: /app
    depends_on:
      - valheim
