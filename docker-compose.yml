# Compose principal do Vikinger Panel — sobe 2 containers:
#   valheim-server  (o servidor de jogo)
#   vikinger-panel  (o painel web que gerencia o servidor)
#
# Para rodar apenas o servidor (sem painel) use server/docker-compose.standalone.yml.

services:
  valheim:
    image: lloesche/valheim-server:latest
    container_name: valheim-server
    restart: unless-stopped
    cap_add:
      - sys_nice
    stop_grace_period: 120s
    ports:
      - "2456-2458:2456-2458/udp"
    volumes:
      - ${HOST_PROJECT_DIR:-.}/config:/config
      - ${HOST_PROJECT_DIR:-.}/data:/opt/valheim
    env_file:
      - .env
    environment:
      BEPINEX: "true"
      SERVER_PORT: "2456"
      TZ: America/Sao_Paulo
      PUID: "1000"
      PGID: "1000"

  panel:
    build: .
    image: vikinger-panel:latest
    container_name: vikinger-panel
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "${PANEL_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount do projeto no MESMO path absoluto do host. Assim o painel roda
      # `docker compose` contra o docker.sock e os paths relativos (./config, ./data)
      # resolvem para diretorios reais do host. config/ e data/ ja fazem parte da arvore.
      - ${HOST_PROJECT_DIR:-.}:${HOST_PROJECT_DIR:-.}
    environment:
      VALHEIM_PANEL_ROOT: ${HOST_PROJECT_DIR:-.}
      PANEL_UID: "1000"
      PANEL_GID: "1000"
      DOCKER_GID: "${DOCKER_GID:-999}"
      PANEL_BUILD_DATE: ${PANEL_BUILD_DATE:-}
    working_dir: /app
    depends_on:
      - valheim
