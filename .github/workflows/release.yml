name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vikinger-panel

jobs:
  release:
    name: release
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: panel/requirements.txt

      - name: Install Python dependencies
        run: pip install -r panel/requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run unit tests
        working-directory: panel
        run: pytest tests/unit -q

      - name: Run E2E tests
        working-directory: panel
        run: pytest tests/e2e -q

      - name: Check CHANGELOG unreleased
        run: |
          python3 - <<'PY'
          import sys
          sys.path.insert(0, "panel")
          from changelog import CHANGELOG_MD, has_unreleased_content
          text = CHANGELOG_MD.read_text(encoding="utf-8")
          if not has_unreleased_content(text):
              print("::warning::CHANGELOG [Unreleased] has no bullet items; release will use fallback notes.")
          PY

      - name: Bump patch version
        id: bump
        run: |
          VERSION=$(python3 scripts/bump-version.py --write)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Nova versão: $VERSION"

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "git_commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "ghcr_owner=$OWNER" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.ghcr_owner }}/${{ env.IMAGE_NAME }}:${{ steps.bump.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.ghcr_owner }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            PANEL_BUILD_DATE=${{ steps.meta.outputs.build_date }}
            PANEL_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}

      - name: Export Docker image to tar
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          OWNER="${{ steps.meta.outputs.ghcr_owner }}"
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:${VERSION}"
          TAR="dist/vikinger-panel-${VERSION}.tar"
          mkdir -p dist
          docker pull "$IMAGE"
          docker save "$IMAGE" -o "$TAR"

      - name: Assemble release ZIP
        run: |
          chmod +x scripts/assemble-release.sh
          ./scripts/assemble-release.sh \
            "${{ steps.bump.outputs.version }}" \
            "${{ steps.meta.outputs.ghcr_owner }}" \
            "${{ steps.meta.outputs.git_commit }}" \
            "${{ steps.meta.outputs.build_date }}" \
            "dist/vikinger-panel-${{ steps.bump.outputs.version }}.tar" \
            dist

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add panel/version.py panel/package.json panel/changelog_data.json README.md CHANGELOG.md
          git diff --staged --quiet && echo "Nada para commitar" && exit 0
          git commit -m "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Prepare release notes
        id: notes
        run: |
          BODY=$(python3 - <<'PY'
          import sys
          sys.path.insert(0, "panel")
          from changelog import version_section_markdown
          print(version_section_markdown("${{ steps.bump.outputs.version }}"))
          PY
          )
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/vikinger-panel-${{ steps.bump.outputs.version }}-dist.zip
            dist/vikinger-panel-${{ steps.bump.outputs.version }}.tar
